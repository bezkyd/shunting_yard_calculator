<!DOCTYPE html>
<html lang="en" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <button id="theme-toggle"><img src="img/theme-toggle.png" alt="Switch theme toggle"></button>
    <div class="calculator">
        <div id="previous"></div>
        <input type="text" id="input-field" placeholder="0">   
        <div id="buttons-group">
            <button class="bracket">(</button>
            <button class="bracket">)</button>

            <button class="top-row-buttons">C</button>
            <button class="top-row-buttons">DEL</button>
            <button class="top-row-buttons">%</button>
            <button class="operator">÷</button>

            <button>7</button>  
            <button>8</button>
            <button>9</button>
            <button class="operator">x</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operator">-</button>
            
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="operator">+</button>
            
            <button id="zero">0</button>
            <button>.</button>
            <button class="operator">=</button>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
